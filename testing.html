  <script>
    window.addEventListener('message', function (event) {
      var msg = event.data;

      // log all iframe messages for debugging
      if (msg && (msg.source === 'pagepilot-demo-viewer' || msg.type && msg.type.startsWith('DEMO_'))) {
        console.log('[Demo raw]', msg.type, msg);
      }

      if (!msg || msg.source !== 'pagepilot-demo-viewer') return;

      console.log('[Demo]', msg.type, msg);

      switch (msg.type) {
        case 'DEMO_STATUS':
          var wrapper = document.getElementById('demo-wrapper');
          if (msg.status === 'live') {
            if (wrapper) wrapper.style.visibility = 'visible';
          } else {
            if (wrapper) wrapper.style.display = 'none';
          }
          break;

        case 'DEMO_LOADED':
          console.log('[Demo] DEMO_LOADED fired');
          break;
      }
    });
  </script>


<script>
  window.addEventListener('message', function (event) {
    var msg = event.data;

    // ignore anything not from our demo viewer
    if (!msg || msg.source !== 'pagepilot-demo-viewer') return;

    console.log('[Demo]', msg.type, msg);

    switch (msg.type) {

      case 'DEMO_LOAD_STARTED':
        // viewer just mounted, show a skeleton or spinner
        break;

      case 'DEMO_LOADING':
        // API call in-flight
        break;

      case 'DEMO_STATUS':
        // msg.status is 'live' or 'draft'
        if (msg.status === 'draft') {
          // demo is in draft — show screenshot / overlay
          var iframe = document.querySelector('iframe');
          if (iframe) iframe.style.opacity = '0.4';

          var draftBanner = document.getElementById('draft-banner');
          if (draftBanner) draftBanner.style.display = 'block';
        }
        break;

      case 'DEMO_LOADED':
        // content is fully visible inside the iframe
        var iframe = document.querySelector('iframe');
        if (iframe) iframe.style.opacity = '1';
        break;
    }
  });
</script>
