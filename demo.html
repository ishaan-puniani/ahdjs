<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ahdjs demo test — live tour</title>
    <link rel="stylesheet" href="./build/css/index.css" />
    <script src="./build/index.js"></script>
    <style>
      html, body { margin: 0; height: 100%; background: #2b2b34; font-family: Inter, Arial, sans-serif; }
      #demo-canvas {
        position: absolute; inset: 0;
        background: #b4b3c1 center / cover no-repeat;
        overflow: hidden;
      }
      #panel {
        position: fixed; z-index: 100000; top: 10px; left: 10px;
        background: rgba(17,17,20,.92); color: #fff; padding: 10px 12px;
        border-radius: 10px; font-size: 12px; width: 250px;
        box-shadow: 0 6px 24px rgba(0,0,0,.4);
      }
      #panel h4 { margin: 0 0 6px; font-size: 12px; font-weight: 600; }
      #panel .row { margin: 6px 0; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
      #panel .lbl { width: 100%; opacity: .7; margin-top: 4px; }
      #panel button {
        padding: 4px 7px; border: 1px solid #444; background: #1d1d24; color: #ddd;
        border-radius: 6px; cursor: pointer; font-size: 11px;
      }
      #panel button:hover { background: #2a2a33; }
      #panel button.active { outline: 2px solid #4ad6ff; color: #fff; border-color: #4ad6ff; }
      #panel .nav button { background: #2f6fed; color: #fff; border-color: #2f6fed; }
      #stepinfo { opacity: .8; }
      #status { opacity: .7; margin: 4px 0; word-break: break-word; }
      /* The highlight element used in "element" mode (mirrors the demo viewer's #tooltip). */
      #tooltip {
        position: absolute; box-sizing: border-box;
        border: 2px dashed rgba(74,214,255,.9); border-radius: 8px;
        background: rgba(74,214,255,.08); pointer-events: none; z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="demo-canvas">
      <div id="tooltip" style="display:none"></div>
    </div>

    <div id="panel">
      <h4>ahdjs demo · live tour</h4>
      <div class="row nav">
        <button id="prev">◀ Prev</button>
        <button id="next">Next ▶</button>
        <button id="reload">⟳ Fetch tour</button>
        <span id="stepinfo"></span>
      </div>
      <div id="status">idle</div>

      <div class="lbl">Branch mode</div>
      <div class="row" id="mode-row">
        <button data-mode="element" class="active">element (#tooltip)</button>
        <button data-mode="coordinate">coordinate</button>
      </div>

      <div class="lbl">Position override</div>
      <div class="row" id="pos-row">
        <button data-pos="" class="active">original</button>
        <button data-pos="top">top</button>
        <button data-pos="bottom">bottom</button>
        <button data-pos="left">left</button>
        <button data-pos="right">right</button>
        <button data-pos="center">center</button>
        <button data-pos="top-left">top-left</button>
        <button data-pos="top-right">top-right</button>
        <button data-pos="bottom-left">bottom-left</button>
        <button data-pos="bottom-right">bottom-right</button>
      </div>

      <div class="lbl">Caret</div>
      <div class="row" id="caret-row">
        <button data-caret="on" class="active">isCaret on</button>
        <button data-caret="off">off</button>
      </div>
    </div>

    <script>
      // --- Live tour source (from the shared curl) -----------------------
      // GET {API_HOST}/api/tenant/{TENANT}/tour/{TOUR} with a bearer token.
      const API_HOST = 'https://pagepilot.fabbuilder.com';
      const TENANT = '633bd6d693b46a69ab83ddff';
      const TOUR = '6a433caedc11465ecca7e1bd';
      const TOKEN =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY2ZDQ0OTU5ZTE0MGQ1NDQ3MjM4OTk1YSIsImlhdCI6MTc4MjkxNzkxMSwiZXhwIjoxNzgzNTIyNzExfQ.TMDMzATc0uJko6Np9J1XqDochFKsACYfB17a9wh9GmY';

      // Steps are populated by fetchTour(); start empty so the page renders
      // before the network call resolves.
      let STEPS = [];

      const canvas = document.getElementById('demo-canvas');
      const hl = document.getElementById('tooltip');
      const statusEl = document.getElementById('status');

      const state = { mode: 'element', posOverride: '', caret: true, index: 0 };

      const AHDjs = window.AHDjs.default || window.AHDjs;
      const ahd = new AHDjs(undefined, {
        root: '#demo-canvas',
        userId: 'tester',
        applicationId: TENANT,
        apiHost: API_HOST,
        useKeyboard: false,
        padding: 4,
      });

      function setStatus(msg) { statusEl.textContent = msg; }

      // Fetch the tour via the shared curl endpoint and normalize each step
      // into the flat shape the demo already renders below.
      async function fetchTour() {
        setStatus('fetching tour…');
        const url = API_HOST + '/api/tenant/' + TENANT + '/tour/' + TOUR;
        try {
          const res = await fetch(url, {
            headers: {
              accept: 'application/json, text/plain, */*',
              authorization: 'Bearer ' + TOKEN,
            },
          });
          if (!res.ok) {
            setStatus('fetch failed: HTTP ' + res.status);
            return;
          }
          const tour = await res.json();
          const rawSteps = Array.isArray(tour.steps) ? tour.steps : [];
          STEPS = rawSteps
            .filter((step) => !!step.content)
            .map((step, i) => ({
              idx: i,
              content: step.content,
              position: step.position,
              isBackdrop: step.isBackdrop,
              isCaret: step.isCaret,
              backgroundImage: step.backgroundImage,
              // Highlight-rectangle geometry (percent strings from the API).
              // The step's own width/height are the tooltip card size; the
              // highlight box geometry lives in canvasWidth/canvasHeight or,
              // for older records, in step.style / step.styles.
              top: step.style?.top || step.styles?.top || step.top,
              left: step.style?.left || step.styles?.left || step.left,
              width: step.canvasWidth || step.style?.width || step.styles?.width || step.width,
              height: step.canvasHeight || step.style?.height || step.styles?.height || step.height,
              // Per-step highlight rectangle style. The publish path puts it at
              // the top level, but the records here only carry it inside
              // contentMetadata — mirror the fallback used in src/lib/index.ts.
              highlightStyle:
                step.highlightStyle ||
                step.contentMetadata?.document?.root?.data?.highlightStyle ||
                null,
            }));
          state.index = 0;
          setStatus('loaded "' + (tour.name || TOUR) + '" · ' + STEPS.length + ' steps');
          await render();
        } catch (e) {
          setStatus('fetch error: ' + (e && e.message ? e.message : e));
        }
      }

      // Position the #tooltip highlight box (element mode) over the step region.
      // When the step carries a real highlightStyle, the library paints its own
      // .gc-interaction rectangle, so drop this placeholder's dashed border/fill
      // to avoid it competing visually with the actual highlight.
      function placeHighlight(s) {
        hl.style.display = 'block';
        hl.style.top = s.top;
        hl.style.left = s.left;
        hl.style.width = s.width;
        hl.style.height = s.height;
        if (s.highlightStyle) {
          hl.style.border = 'none';
          hl.style.background = 'transparent';
        } else {
          hl.style.border = '';
          hl.style.background = '';
        }
      }

      function buildSteps() {
        return STEPS.map((s) => {
          const position = state.posOverride || s.position;
          const base = {
            position,
            description: s.content,
            isCaret: state.caret,
            isBackdrop: s.isBackdrop,
            highlightStyle: s.highlightStyle,
            // highlightStyle only paints the .gc-interaction rectangle, and that
            // element is rendered only when interaction is disabled (the template
            // uses if="!interaction"). Steps with a highlightStyle must therefore
            // opt out of interaction so the highlight box is actually created.
            interaction: s.highlightStyle ? false : undefined,
            type: 'demo',
            animationType: 'instant',
            delay: 0,
          };
          if (state.mode === 'element') {
            return Object.assign(base, { element: '#tooltip' });
          }
          // coordinate mode: feed raw coords, no element (exercises coordinate branch)
          return Object.assign(base, {
            top: s.top, left: s.left, width: s.width, height: s.height,
            canvasWidth: canvas.offsetWidth, canvasHeight: canvas.offsetHeight,
          });
        });
      }

      async function render() {
        if (!STEPS.length) {
          setStatus('no steps — click "Fetch tour"');
          return;
        }
        const s = STEPS[state.index];
        canvas.style.backgroundImage = s.backgroundImage ? 'url("' + s.backgroundImage + '")' : 'none';
        if (state.mode === 'element') placeHighlight(s); else hl.style.display = 'none';
        document.getElementById('stepinfo').textContent =
          'step ' + (state.index + 1) + '/' + STEPS.length + ' · ' + (state.posOverride || s.position) + ' · ' + state.mode;

        try { await ahd.stop(); } catch (e) {}
        ahd.setTour(buildSteps());
        await ahd.start(state.index, true);
      }

      function bindGroup(rowId, key, parse) {
        const row = document.getElementById(rowId);
        row.addEventListener('click', (e) => {
          const btn = e.target.closest('button');
          if (!btn || !row.contains(btn)) return;
          [...row.querySelectorAll('button')].forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          state[key] = parse(btn);
          render();
        });
      }

      bindGroup('mode-row', 'mode', (b) => b.dataset.mode);
      bindGroup('pos-row', 'posOverride', (b) => b.dataset.pos);
      bindGroup('caret-row', 'caret', (b) => b.dataset.caret === 'on');

      document.getElementById('next').addEventListener('click', () => {
        if (!STEPS.length) return;
        state.index = (state.index + 1) % STEPS.length; render();
      });
      document.getElementById('prev').addEventListener('click', () => {
        if (!STEPS.length) return;
        state.index = (state.index - 1 + STEPS.length) % STEPS.length; render();
      });
      document.getElementById('reload').addEventListener('click', fetchTour);

      // Fetch the live tour on load, then render.
      window.addEventListener('load', fetchTour);
      // expose for console poking
      window._ahd = ahd; window._state = state;
    </script>
  </body>
</html>
