      #panel {

        border-radius: 10px; font-size: 12px; width: 250px;

      #panel .lbl { width: 100%; opacity: .7; margin-top: 4px; }

      }
      #panel button:hover { background: #2a2a33; }
      #panel button.active { outline: 2px solid #4ad6ff; color: #fff; border-color: #4ad6ff; }
      #panel .nav button { background: #2f6fed; color: #fff; border-color: #2f6fed; }
      #stepinfo { opacity: .8; }
      /* The highlight element used in "element" mode (mirrors the demo viewer's #tooltip). */
      #tooltip {
        position: absolute; box-sizing: border-box;
        border: 2px dashed rgba(74,214,255,.9); border-radius: 8px;
        background: rgba(74,214,255,.08); pointer-events: none; z-index: 1;

      </div>

direction:row;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap;box-sizing:border-box;width:100%\\\" role=\\\"group\\\">\u003cdiv id=\\\"block-1781851687905-ckki2oi\\\" style=\\\"scroll-margin-top:80px\\\">\u003cdiv id=\\\"bh-Ref6\\\" class=\\\"button-block\\\" style=\\\"padding:0px 0px 0px 0px\\\">\u003cbutton style=\\\"cursor:pointer;border:none;border-radius:4px;width:auto;font-weight:400;font-family:inherit;background-color:transparent;text-align:center;text-decoration:none;font-size:16px;padding:12px 20px;box-sizing:border-box\\\" data-action=\\\"onPrevStep\\\" type=\\\"button\\\">\u003cspan style=\\\"margin-right:4px;display:inline-flex;vertical-align:middle;pointer-events:none\\\" data-action=\\\"onPrevStep\\\">\u003csvg xmlns=\\\"http://www.w3.org/2000/svg\\\" width=\\\"16\\\" height=\\\"16\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\">\u003cpath d=\\\"M15 18L9 12L15 6\\\" stroke=\\\"rgba(166, 166, 166, 1)\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\" stroke-linejoin=\\\"round\\\">\u003c/path>\u003c/svg>\u003c/span>\u003cspan style=\\\"color:rgba(166, 166, 166, 1);pointer-events:none\\\" data-action=\\\"onPrevStep\\\">Previous\u003c/span>\u003c/button>\u003c/div>\u003c/div>\u003cdiv id=\\\"block-1781760547774-66283\\\" style=\\\"scroll-margin-top:80px\\\">\u003cdiv id=\\\"bh-Rmf6\\\" class=\\\"button-block\\\">\u003cbutton style=\\\"cursor:pointer;border:none;border-radius:4px;width:auto;font-weight:400;font-family:inherit;background-color:transparent;text-align:center;text-decoration:none;font-size:16px;padding:12px 20px;box-sizing:border-box\\\" data-action=\\\"onCloseStep\\\" type=\\\"button\\\">\u003cspan style=\\\"color:rgba(255,255,255, 1);pointer-events:none\\\" data-action=\\\"onCloseStep\\\">Finish \u003c/span>\u003cspan style=\\\"margin-left:4px;display:inline-flex;vertical-align:middle;pointer-events:none\\\" data-action=\\\"onCloseStep\\\">\u003csvg xmlns=\\\"http://www.w3.org/2000/svg\\\" width=\\\"16\\\" height=\\\"16\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\">\u003cpath d=\\\"M6 18L18 6M18 6H10M18 6V14\\\" stroke=\\\"rgba(255,255,255, 1)\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\" stroke-linejoin=\\\"round\\\">\u003c/path>\u003c/svg>\u003c/span>\u003c/button>\u003c/div>\u003c/div>\u003c/div>\u003c/div>\u003cdiv class=\\\"ahd-branding-footer\\\" style=\\\"display:block;width:100%;text-align:left;font-size:11px;color:#8a8a8a;margin-top:8px\\\">\u003ca href=\\\"https://pagepilot.fabbuilder.com\\\" target=\\\"_blank\\\" rel=\\\"noopener noreferrer\\\" style=\\\"color:inherit;text-decoration:underline\\\">Made with Page Pilot\u003c/a>\u003c/div>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\u003c/div>\u003c/div>\u003c/main>\u003c/div>\u003c/div>\",\"top\":\"0.00%\",\"left\":\"93.32%\",\"width\":\"3.03%\",\"height\":\"6.97%\",\"backgroundImage\":\"https://storage-for-tutors.ams3.cdn.digitaloceanspaces.com/helpdesk/tenant/6655bc2b30a6760d8f897581/content/image/8bbf6ed9-3d5f-402c-85d3-054d8cde851d.png\",\"isBackdrop\":true}]}");
      const STEPS = DATA.steps;
      const canvas = document.getElementById('demo-canvas');
      const hl = document.getElementById('tooltip');

      const state = { mode: 'element', posOverride: '', caret: true, index: 0 };

      const AHDjs = window.AHDjs.default || window.AHDjs;
      const ahd = new AHDjs(undefined, {
        root: '#demo-canvas',
        userId: 'tester',
        applicationId: '6655bc2b30a6760d8f897581',
        apiHost: 'https://pagepilot.fabbuilder.com',
        useKeyboard: false,
        padding: 4,
      });

      // Position the #tooltip highlight box (element mode) over the step region.
      function placeHighlight(s) {
        hl.style.display = 'block';
        hl.style.top = s.top;
        hl.style.left = s.left;
        hl.style.width = s.width;
        hl.style.height = s.height;
      }

      function buildSteps() {
        return STEPS.map((s) => {
          const position = state.posOverride || s.position;
          const base = {
            position,
            description: s.content,
            isCaret: true,
            isBackdrop: s.isBackdrop,
            type: 'demo',
            animationType: 'instant',
            delay: 0,
          };
          if (state.mode === 'element') {
            return Object.assign(base, { element: '#tooltip' });
          }
          // coordinate mode: feed raw coords, no element (exercises coordinate branch)
          return Object.assign(base, {
            top: s.top, left: s.left, width: s.width, height: s.height,
            canvasWidth: canvas.offsetWidth, canvasHeight: canvas.offsetHeight,
          });
        });
      }

      async function render() {
        const s = STEPS[state.index];
        canvas.style.backgroundImage = s.backgroundImage ? 'url("' + s.backgroundImage + '")' : 'none';
        if (state.mode === 'element') placeHighlight(s); else hl.style.display = 'none';
        document.getElementById('stepinfo').textContent =
          'step ' + (state.index + 1) + '/' + STEPS.length + ' · ' + (state.posOverride || s.position) + ' · ' + state.mode;

        try { await ahd.stop(); } catch (e) {}
        ahd.setTour(buildSteps());
        await ahd.start(state.index, true);
      }

      function bindGroup(rowId, key, parse) {
        const row = document.getElementById(rowId);
        row.addEventListener('click', (e) => {
          const btn = e.target.closest('button');
          if (!btn || !row.contains(btn)) return;
          [...row.querySelectorAll('button')].forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          state[key] = parse(btn);
          render();
        });
      }

      bindGroup('mode-row', 'mode', (b) => b.dataset.mode);
      bindGroup('pos-row', 'posOverride', (b) => b.dataset.pos);
      bindGroup('caret-row', 'caret', (b) => b.dataset.caret === 'on');

      document.getElementById('next').addEventListener('click', () => {
        state.index = (state.index + 1) % STEPS.length; render();
      });
      document.getElementById('prev').addEventListener('click', () => {
        state.index = (state.index - 1 + STEPS.length) % STEPS.length; render();
      });

      window.addEventListener('load', render);
      // expose for console poking
      window._ahd = ahd; window._state = state;
    </script>
