order-box;border-radius:16px 16px 16px 16px\\\"/></div></div><div id=\\\"block-1781941480699-0mnlq7y\\\" style=\\\"scroll-margin-top:80px\\\"><div class=\\\"text-block\\\" style=\\\"color:#262626;font-family:Inter, &quot;Helvetica Neue&quot;, &quot;Arial Nova&quot;, &quot;Nimbus Sans&quot;, Arial, sans-serif;font-weight:normal;text-align:center;padding:5px 0px 5px 0px;word-break:break-word;overflow-wrap:break-word\\\"><style>.text-block ul,.text-block ol{margin-block-start:0;margin-block-end:0;padding-inline-start:revert}.text-block li{display:list-item}</style><div><p style=\\\"text-align: center; \\\"><font style=\\\"font-size: 14px;\\\" face=\\\"Source Sans Pro, Helvetica Neue, Arial, sans-serif\\\"></font></p><p><font style=\\\"font-size: 14px;\\\" face=\\\"Source Sans Pro, Helvetica Neue, Arial, sans-serif\\\"></font></p><p><font style=\\\"font-size: 14px;\\\" face=\\\"Source Sans Pro, Helvetica Neue, Arial, sans-serif\\\"></font></p><p><font face=\\\"Source Sans Pro, Helvetica Neue, Arial, sans-serif\\\" style=\\\"font-size: 14px;\\\"><font style=\\\"\\\">The top three players right now. Beat them before midnight to claim the seat.</font><span style=\\\"font-style: inherit; font-variant-ligatures: inherit; font-variant-caps: inherit;\\\">&nbsp;</span></font></p><span style=\\\"font-size: 14px; font-family: &quot;Source Sans Pro&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif; font-style: inherit; font-variant-ligatures: inherit; font-variant-caps: inherit;\\\"></span><p></p><p></p><p></p></div></div></div><div id=\\\"block-1781941673791-jnegyj9\\\" style=\\\"scroll-margin-top:80px\\\"><div class=\\\"flex-columns-block\\\" style=\\\"box-sizing:border-box;width:100%\\\" data-cols=\\\"2\\\"><div class=\\\"fc-row\\\" style=\\\"display:flex;flex-wrap:nowrap;flex-direction:row;gap:16px;align-items:stretch;width:100%;box-sizing:border-box;--fc-gap:16px\\\"><div class=\\\"fc-col fc-col-equal\\\" style=\\\"min-width:0;box-sizing:border-box;flex:1 1 0;width:0\\\"><div id=\\\"block-1781941679327-oqqy23w\\\" style=\\\"scroll-margin-top:80px\\\"><div id=\\\"bh-R5ht6\\\" class=\\\"button-block\\\" style=\\\"padding:0px 0px 0px 0px\\\"><button style=\\\"cursor:pointer;border-top:1px solid rgba(54, 41, 87, 1);border-right:1px solid rgba(54, 41, 87, 1);border-bottom:1px solid rgba(54, 41, 87, 1);border-left:1px solid rgba(54, 41, 87, 1);border-radius:8px 8px 8px 8px;width:auto;font-weight:400;font-family:Inter, &quot;Helvetica Neue&quot;, &quot;Arial Nova&quot;, &quot;Nimbus Sans&quot;, Arial, sans-serif;background-color:rgba(255, 253, 246, 1);text-align:center;text-decoration:none;font-size:16px;padding:8px 12px;box-sizing:border-box\\\" data-action=\\\"onPrevStep\\\" type=\\\"button\\\"><span style=\\\"color:rgba(54, 41, 87, 1);pointer-events:none\\\" data-action=\\\"onPrevStep\\\">Back</span></button></div></div></div><div class=\\\"fc-col fc-col-equal\\\" style=\\\"min-width:0;box-sizing:border-box;flex:1 1 0;width:0\\\"><div id=\\\"block-1781941716162-nx5g3hi\\\" style=\\\"scroll-margin-top:80px\\\"><div id=\\\"bh-R6ht6\\\" class=\\\"button-block\\\" style=\\\"text-align:right;padding:0px 0px 0px 0px\\\"><style>#bh-R6ht6 a:hover, #bh-R6ht6 button:hover { background-color: rgb(30, 21, 51) !important; background-image: none !important; transition: background-color 150ms ease, color 150ms ease; } #bh-R6ht6 a:hover span, #bh-R6ht6 button:hover span {  }</style><button style=\\\"cursor:pointer;border-top:1px solid rgba(54, 41, 87, 1);border-right:1px solid rgba(54, 41, 87, 1);border-bottom:1px solid rgba(54, 41, 87, 1);border-left:1px solid rgba(54, 41, 87, 1);border-radius:8px 8px 8px 8px;width:auto;font-weight:400;font-family:Inter, &quot;Helvetica Neue&quot;, &quot;Arial Nova&quot;, &quot;Nimbus Sans&quot;, Arial, sans-serif;background-color:rgba(54, 41, 87, 1);text-align:right;text-decoration:none;font-size:16px;padding:8px 12px;box-sizing:border-box\\\" data-action=\\\"onCloseStep\\\" type=\\\"button\\\"><span style=\\\"color:rgba(255, 255, 255, 1);pointer-events:none\\\" data-action=\\\"onCloseStep\\\">Finish</span></button></div></div></div></div></div></div><div class=\\\"ahd-branding-footer\\\" style=\\\"display:block;width:100%;text-align:left;font-size:11px;color:#8a8a8a;margin-top:8px\\\"><a href=\\\"https://pagepilot.fabbuilder.com\\\" target=\\\"_blank\\\" rel=\\\"noopener noreferrer\\\" style=\\\"color:inherit;text-decoration:underline\\\">Made with Page Pilot</a></div></td></tr></tbody></table></div></div></div></div></main></div></div>\",\"top\":\"37.24%\",\"left\":\"13.70%\",\"width\":\"28.93%\",\"height\":\"19.67%\",\"backgroundImage\":\"https://storage-for-tutors.ams3.cdn.digitaloceanspaces.com/helpdesk/tenant/68bfebb0ee5ff55a67f586b7/content/image/cc5407e3-3e4c-4e69-b4fc-b5d1f9ef2945.png\",\"isBackdrop\":true}]}");
      const STEPS = DATA.steps;

      const POSITIONS = ["", "top", "bottom", "left", "right", "center", "top-left", "top-right", "bottom-left", "bottom-right"];

      function App() {
        const [mode, setMode] = useState("element");       // element | coordinate
        const [posOverride, setPosOverride] = useState(""); // "" = original
        const [caret, setCaret] = useState(true);
        const [index, setIndex] = useState(0);

        const ahdRef = useRef(null);
        const canvasRef = useRef(null);
        const hlRef = useRef(null);

        // Initialise the ahdjs instance once, after the canvas is mounted.
        useEffect(() => {
          const AHDjs = window.AHDjs.default || window.AHDjs;
          const ahd = new AHDjs(undefined, {
            root: "#demo-canvas",
            userId: "tester",
            applicationId: "6655bc2b30a6760d8f897581",
            apiHost: "https://pagepilot.fabbuilder.com",
            useKeyboard: false,
            padding: 4,
          });
          ahdRef.current = ahd;
          window._ahd = ahd; // expose for console poking
          return () => { try { ahd.stop(); } catch (e) {} };
        }, []);

        const buildSteps = useCallback(() => {
          return STEPS.map((s) => {
            const position = posOverride || s.position;
            const base = {
              position,
              description: s.content,
              isCaret: caret,
              isBackdrop: s.isBackdrop,
              type: "demo",
              animationType: "instant",
              delay: 0,
            };
            if (mode === "element") {
              return Object.assign(base, { element: "#tooltip" });
            }
            // coordinate mode: feed raw coords, no element (exercises coordinate branch)
            const canvas = canvasRef.current;
            return Object.assign(base, {
              top: s.top, left: s.left, width: s.width, height: s.height,
              canvasWidth: canvas.offsetWidth, canvasHeight: canvas.offsetHeight,
            });
          });
        }, [mode, posOverride, caret]);

        // Re-render the tour whenever the step or any option changes.
        useEffect(() => {
          const ahd = ahdRef.current;
          if (!ahd) return;
          const s = STEPS[index];
          const canvas = canvasRef.current;
          const hl = hlRef.current;

          canvas.style.backgroundImage = s.backgroundImage ? `url("${s.backgroundImage}")` : "none";
          if (mode === "element") {
            hl.style.display = "block";
            hl.style.top = s.top; hl.style.left = s.left;
            hl.style.width = s.width; hl.style.height = s.height;
          } else {
            hl.style.display = "none";
          }

          let cancelled = false;
          (async () => {
            try { await ahd.stop(); } catch (e) {}
            if (cancelled) return;
            ahd.setTour(buildSteps());
            await ahd.start(index, true);
            // Re-run the bundle scaling handler after the tooltip mounts.
            setTimeout(() => window.dispatchEvent(new Event("resize")), 50);
          })();
          return () => { cancelled = true; };
        }, [index, mode, posOverride, caret, buildSteps]);

        const next = () => setIndex((i) => (i + 1) % STEPS.length);
        const prev = () => setIndex((i) => (i - 1 + STEPS.length) % STEPS.length);
        const s = STEPS[index];
        const cx = (active) => (active ? "active" : "");

        return (
          <React.Fragment>
            <div id="demo-canvas" ref={canvasRef}>
              <div id="tooltip" ref={hlRef} style={{ display: "none" }}></div>
            </div>

            <div id="panel">
              <h4>ahdjs demo · corner caret test <span className="tag">React</span></h4>

              <div className="row nav">
                <button onClick={prev}>◀ Prev</button>
                <button onClick={next}>Next ▶</button>
                <span id="stepinfo">
                  {"step " + (index + 1) + "/" + STEPS.length + " · " + (posOverride || s.position) + " · " + mode}
                </span>
              </div>

              <div className="lbl">Branch mode</div>
              <div className="row">
                <button className={cx(mode === "element")} onClick={() => setMode("element")}>element (#tooltip)</button>
                <button className={cx(mode === "coordinate")} onClick={() => setMode("coordinate")}>coordinate</button>
              </div>

              <div className="lbl">Position override</div>
              <div className="row">
                {POSITIONS.map((p) => (
                  <button key={p || "original"} className={cx(posOverride === p)} onClick={() => setPosOverride(p)}>
                    {p || "original"}
                  </button>
                ))}
              </div>

              <div className="lbl">Caret</div>
              <div className="row">
                <button className={cx(caret)} onClick={() => setCaret(true)}>isCaret on</button>
                <button className={cx(!caret)} onClick={() => setCaret(false)}>off</button>
              </div>
            </div>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
